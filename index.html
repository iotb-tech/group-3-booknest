<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookNest | Discover Your Next Read</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              parchment: "#F9F6F0",
              ink: "#2C2C2C",
              oxblood: "#6B2737",
              forest: "#2D4A3E",
              sage: "#A3B18A",
              "warm-gray": "#A89F91",
            },
            fontFamily: {
              display: ['"Playfair Display"', "serif"],
              body: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-parchment text-ink font-body min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-forest text-parchment py-2 md:py-2">
      <div class="container mx-auto flex items-center justify-between px-4">
        <!-- Logo/Brand -->
        <a href="#" class="flex items-center gap-3 flex-shrink-0">
          <img
            src="assets/booknest-logo.png"
            alt="BookNest Logo"
            width="50"
            height="50"
            class="rounded-lg"
          />
          <span class="text-3xl font-display font-bold"
            >Book<span class="text-[#A89F91]">Nest</span></span
          >
        </a>

        <!-- Favorites button -->
        <button
          id="favorites-toggle"
          class="hover:text-sage transition flex items-center gap-1"
        >
          Favorites
          <span
            id="favorites-count"
            class="bg-oxblood text-parchment text-xs rounded-full px-2 py-0.5"
            >0</span
          >
        </button>
      </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
      <form id="search-form" class="mb-8">
        <div class="flex gap-2 max-w-2xl mx-auto">
          <input
            type="text"
            id="search-input"
            placeholder="Search for a book..."
            class="flex-1 px-4 py-3 border border-warm-gray rounded-lg focus:outline-none focus:ring-2 focus:ring-forest bg-white"
          />
          <button
            type="submit"
            class="px-6 py-3 bg-forest text-parchment font-semibold rounded-lg hover:bg-opacity-90 transition"
          >
            Search
          </button>
        </div>
      </form>

      <!-- Loading State -->
      <div id="loading-state" class="hidden text-center py-12">
        <p class="text-warm-gray text-lg">Searching...</p>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-12">
        <p class="text-warm-gray text-lg">
          No books found. Try a different search.
        </p>
      </div>

      <!-- Error State -->
      <div id="error-state" class="hidden text-center py-12">
        <p class="text-oxblood text-lg">Something went wrong.</p>
        <p data-error-message class="text-warm-gray text-sm mt-2"></p>
      </div>

      <!-- Results Container -->
      <div id="results-container" class="hidden">
        <div
          data-results-grid
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
        ></div>
      </div>

      <!-- Favorites Section -->
      <div
        id="favorites-container"
        class="mt-12 border-t border-warm-gray pt-8"
      ></div>
    </main>

    <footer id="credits" class="bg-ink text-warm-gray py-8 mt-auto">
      <div class="container mx-auto px-4 text-center">
        <p class="text-lg font-display text-parchment mb-2">BookNest</p>
        <p class="text-sm mt-1">Built by Group 3</p>
      </div>
    </footer>

    <!-- Detail View Modal -->
    <div id="detail-modal" class="fixed inset-0 z-50 hidden"></div>

    <!-- Favorites Slide-in Panel -->
    <div
      id="favorites-panel"
      class="fixed inset-y-0 right-0 w-80 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300"
    >
      <div class="flex flex-col h-full">
        <!-- Panel Header -->
        <div
          class="flex items-center justify-between p-4 border-b border-warm-gray"
        >
          <h2 class="font-display text-xl font-bold text-oxblood">
            My Favorites
          </h2>
          <button
            id="favorites-panel-close"
            class="text-2xl text-warm-gray hover:text-ink transition-colors"
            aria-label="Close favorites"
          >
            ×
          </button>
        </div>

        <!-- Panel Content -->
        <div
          id="favorites-panel-content"
          class="flex-1 overflow-y-auto p-4"
        ></div>
      </div>
    </div>

    <div
      id="favorites-backdrop"
      class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden"
    ></div>

    <script type="module" src="dist/app.js"></script>
  </body>
</html>
